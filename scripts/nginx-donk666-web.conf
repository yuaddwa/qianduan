# donk666：前端在 /web/ + 反代后端 API（解决 /api、/uploads 404）
#
# 前端：npm run build:web 后部署到 /opt/ysc/frontend/dist
# 后端：假设与本机 Nginx 同机，监听 127.0.0.1:8080（若不同机把下面改成 http://101.37.157.23:8080）
#
# CentOS 常见路径：/etc/nginx/conf.d/donk666.conf
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 101.37.157.23;

    # —— 后端 API（个人页 /api/users/me、头像 /api/users/me/avatar 等）——
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # —— 用户上传头像等静态资源（路径常为 /uploads/xxx.png）——
    location /uploads/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # —— 前端 SPA（子路径 /web/）——
    location = /web {
        return 301 /web/;
    }

    location /web/ {
        alias /opt/ysc/frontend/dist/;
        index index.html;
    }

    location = / {
        return 302 /web/;
    }
}
