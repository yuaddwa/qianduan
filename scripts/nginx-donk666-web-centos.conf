# 与 nginx-donk666-web.conf 相同，供 CentOS 放到 /etc/nginx/conf.d/donk666-web.conf
# 含：/web/ 静态 + /api + /uploads 反代到本机 8080

server {
    listen 80;
    server_name 101.37.157.23;

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /web {
        return 301 /web/;
    }

    location /web/ {
        alias /opt/ysc/frontend/dist/;
        index index.html;
    }

    location = / {
        return 302 /web/;
    }
}
